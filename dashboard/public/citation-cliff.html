<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citation Cliff: The Forgetting Curve of Classical MAS</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #09090b;
      color: #d4d4d8;
      overflow: hidden;
      height: 100vh;
    }
    .container { display: flex; flex-direction: column; height: 100vh; }
    .header {
      padding: 12px 20px;
      border-bottom: 1px solid #27272a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #71717a;
    }
    .header h1 .accent { color: #ef4444; }
    .header .meta { font-size: 9px; color: #52525b; margin-top: 2px; }
    .header .meta .red { color: #ef4444; }
    .header .meta .amber { color: #f59e0b; }
    .header .meta .green { color: #22c55e; }
    .controls { display: flex; align-items: center; gap: 8px; }
    .controls button {
      padding: 3px 8px;
      font-size: 9px;
      border: 1px solid #27272a;
      border-radius: 4px;
      background: transparent;
      color: #71717a;
      cursor: pointer;
      transition: all 0.15s;
    }
    .controls button:hover { color: #d4d4d8; border-color: #3f3f46; }
    .controls button.active { border-color: #3b82f680; color: #60a5fa; background: #3b82f610; }
    .main { display: flex; flex: 1; min-height: 0; }
    .chart-area { flex: 1; padding: 12px 16px; overflow: auto; position: relative; }
    .legend {
      width: 260px;
      flex-shrink: 0;
      border-left: 1px solid #27272a;
      overflow-y: auto;
      padding: 8px;
    }
    .legend-header {
      padding: 4px 8px;
      font-size: 9px;
      color: #52525b;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid #27272a40;
      margin-bottom: 4px;
    }
    .legend-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .legend-item:hover { background: #ffffff08; }
    .legend-item.dimmed .name { color: #52525b; }
    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      margin-top: 2px;
      flex-shrink: 0;
    }
    .legend-swatch.empty { border: 1px solid #52525b; background: transparent; }
    .legend-info { flex: 1; min-width: 0; }
    .legend-info .name { font-size: 9px; color: #d4d4d8; font-weight: 500; }
    .legend-info .stats { font-size: 8px; color: #52525b; margin-top: 1px; display: flex; gap: 6px; }
    .survival-badge {
      font-size: 7px;
      padding: 0 4px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tooltip {
      position: absolute;
      pointer-events: none;
      background: #18181bf0;
      border: 1px solid #27272a;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 9px;
      z-index: 100;
      box-shadow: 0 4px 12px #00000060;
    }
    .tooltip .year { font-weight: 700; color: #71717a; margin-bottom: 3px; }
    .tooltip .row { display: flex; align-items: center; gap: 6px; }
    .tooltip .row .swatch { width: 8px; height: 2px; border-radius: 1px; }
    .tooltip .row .val { color: #d4d4d8; margin-left: auto; }
    svg text { font-family: inherit; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Citation Cliff <span class="accent">The Forgetting Curve of MAS</span></h1>
        <div class="meta" id="stats"></div>
      </div>
      <div class="controls">
        <button id="btn-svg" title="Download SVG">SVG</button>
        <button id="btn-annotations" class="active">Annotations</button>
        <button id="btn-normalized">Normalized</button>
        <button id="btn-lost"><span style="display:inline-block;width:8px;height:2px;background:#ef4444;border-radius:1px;margin-right:3px;vertical-align:middle"></span>Lost</button>
        <button id="btn-fading"><span style="display:inline-block;width:8px;height:2px;background:#f59e0b;border-radius:1px;margin-right:3px;vertical-align:middle"></span>Fading</button>
        <button id="btn-active"><span style="display:inline-block;width:8px;height:2px;background:#22c55e;border-radius:1px;margin-right:3px;vertical-align:middle"></span>Active</button>
      </div>
    </div>
    <div class="main">
      <div class="chart-area" id="chart-area">
        <svg id="chart"></svg>
        <div class="tooltip" id="tooltip" style="display:none"></div>
      </div>
      <div class="legend" id="legend">
        <div class="legend-header">Concepts</div>
      </div>
    </div>
  </div>

  <script>
    const COLORS = [
      "#ef4444", "#f97316", "#eab308", "#84cc16", "#22c55e",
      "#14b8a6", "#06b6d4", "#3b82f6", "#6366f1", "#8b5cf6",
      "#a855f7", "#d946ef", "#ec4899", "#f43f5e", "#fb923c",
      "#a3e635", "#2dd4bf",
    ];
    const SURVIVAL_COLOR = {
      genuinely_lost: "#ef4444",
      known_but_ignored: "#f59e0b",
      below_threshold: "#f59e0b",
      renamed: "#f59e0b",
      active: "#22c55e",
    };

    let DATA = null;
    let selected = new Set();
    let normalized = false;
    let showAnnotations = true;
    let hoveredIdx = null;

    async function init() {
      try {
        const res = await fetch("/api/agent0/citation-cliff");
        DATA = await res.json();
      } catch {
        document.getElementById("stats").textContent = "Failed to load data";
        return;
      }

      selected = new Set(DATA.concepts.map((_, i) => i));

      const lost = DATA.concepts.filter(c => c.survival === "genuinely_lost").length;
      const fading = DATA.concepts.filter(c => ["renamed","known_but_ignored","below_threshold"].includes(c.survival)).length;
      const active = DATA.concepts.filter(c => c.survival === "active").length;
      document.getElementById("stats").innerHTML =
        `<span class="red">${lost} genuinely lost</span> &middot; ` +
        `<span class="amber">${fading} renamed/fading</span> &middot; ` +
        `<span class="green">${active} active</span> &middot; ` +
        `${DATA.concepts.length} concepts, ${DATA.metadata.paperCount} papers`;

      buildLegend();
      draw();
      bindControls();
    }

    function buildLegend() {
      const el = document.getElementById("legend");
      el.innerHTML = '<div class="legend-header">Concepts</div>';
      DATA.concepts.forEach((c, i) => {
        const color = COLORS[i % COLORS.length];
        const sc = SURVIVAL_COLOR[c.survival] || "#f59e0b";
        const survLabel = c.survival === "genuinely_lost" ? "lost" :
          c.survival === "known_but_ignored" ? "ignored" :
          c.survival === "below_threshold" ? "fading" : c.survival;
        const item = document.createElement("div");
        item.className = "legend-item";
        item.dataset.idx = i;
        item.innerHTML = `
          <div class="legend-swatch ${selected.has(i) ? '' : 'empty'}" style="background:${selected.has(i) ? color : 'transparent'}"></div>
          <div class="legend-info">
            <div class="name">${c.name}</div>
            <div class="stats">
              <span class="survival-badge" style="background:${sc}20;color:${sc}">${survLabel}</span>
              <span>${c.totalCitations.toLocaleString()}</span>
              ${c.peakYear ? `<span>pk ${c.peakYear}</span>` : ''}
            </div>
          </div>`;
        item.addEventListener("click", () => {
          if (selected.has(i)) selected.delete(i); else selected.add(i);
          updateLegendStyles();
          draw();
        });
        item.addEventListener("mouseenter", () => { hoveredIdx = i; draw(); });
        item.addEventListener("mouseleave", () => { hoveredIdx = null; draw(); });
        el.appendChild(item);
      });
    }

    function updateLegendStyles() {
      document.querySelectorAll(".legend-item").forEach(el => {
        const i = +el.dataset.idx;
        const sw = el.querySelector(".legend-swatch");
        if (selected.has(i)) {
          sw.classList.remove("empty");
          sw.style.background = COLORS[i % COLORS.length];
          el.querySelector(".name").style.color = "#d4d4d8";
        } else {
          sw.classList.add("empty");
          sw.style.background = "transparent";
          el.querySelector(".name").style.color = "#52525b";
        }
      });
    }

    function draw() {
      const concepts = DATA.concepts;
      const yearRange = DATA.yearRange;
      const annotations = DATA.annotations;
      const active = concepts.filter((_, i) => selected.has(i));

      const margin = { top: 24, right: 24, bottom: 36, left: 50 };
      const W = 960, H = 360;
      const iW = W - margin.left - margin.right;
      const iH = H - margin.top - margin.bottom;

      const svg = d3.select("#chart")
        .attr("viewBox", `0 0 ${W} ${H}`)
        .attr("width", "100%")
        .style("min-width", "800px")
        .style("background", "#09090b");

      svg.selectAll("*").remove();

      const minY = yearRange[0] || 1980;
      const maxY = yearRange[yearRange.length - 1] || 2026;
      const x = d3.scaleLinear().domain([minY, maxY]).range([margin.left, W - margin.right]);

      let yMax = 10;
      for (const c of active) {
        for (const d of c.yearData) {
          const v = normalized && c.totalCitations > 0 ? (d.citations / c.totalCitations) * 1000 : d.citations;
          if (v > yMax) yMax = v;
        }
      }
      yMax = Math.ceil(yMax * 1.15);
      const y = d3.scaleLinear().domain([0, yMax]).range([margin.top + iH, margin.top]);

      // Era bands
      if (showAnnotations) {
        const eras = annotations.filter(a => a.type === "era_label");
        const eraColors = ["#22c55e06", "#3b82f606", "#ef444408"];
        const eraTextColors = ["#22c55e", "#3b82f6", "#ef4444"];
        eras.forEach((era, i) => {
          const x1 = x(Math.max(era.year_start, minY));
          const x2 = x(Math.min(era.year_end, maxY));
          svg.append("rect").attr("x", x1).attr("y", margin.top).attr("width", x2-x1).attr("height", iH).attr("fill", eraColors[i]);
          svg.append("text").attr("x", (x1+x2)/2).attr("y", H-22).attr("text-anchor", "middle").attr("fill", eraTextColors[i]).attr("opacity", 0.3).attr("font-size", 9).attr("font-weight", "bold").text(era.label);
        });

        // Failure band
        const fb = annotations.find(a => a.type === "failure_band");
        if (fb) {
          svg.append("rect").attr("x", x(fb.year_start)).attr("y", margin.top).attr("width", x(fb.year_end) - x(fb.year_start)).attr("height", iH).attr("fill", "#ef4444").attr("opacity", 0.06);
          svg.append("line").attr("x1", x(fb.year_start)).attr("y1", margin.top).attr("x2", x(fb.year_start)).attr("y2", margin.top + iH).attr("stroke", "#ef4444").attr("stroke-dasharray", "4 3").attr("opacity", 0.5);
          svg.append("text").attr("x", x(fb.year_start) + 4).attr("y", margin.top + 12).attr("fill", "#ef4444").attr("opacity", 0.7).attr("font-size", 8).attr("font-weight", "bold").text(fb.label);
        }
      }

      // Grid
      const yStep = yMax > 500 ? Math.ceil(yMax / 5 / 100) * 100 : yMax > 100 ? Math.ceil(yMax / 5 / 10) * 10 : Math.ceil(yMax / 5);
      for (let v = 0; v <= yMax; v += yStep) {
        svg.append("line").attr("x1", margin.left).attr("y1", y(v)).attr("x2", W - margin.right).attr("y2", y(v)).attr("stroke", "#27272a").attr("stroke-width", 0.5);
        svg.append("text").attr("x", margin.left - 6).attr("y", y(v) + 3).attr("text-anchor", "end").attr("fill", "#52525b").attr("font-size", 8).text(v);
      }

      // X ticks
      for (let yr = Math.ceil(minY/5)*5; yr <= maxY; yr += 5) {
        svg.append("text").attr("x", x(yr)).attr("y", H - 6).attr("text-anchor", "middle").attr("fill", "#52525b").attr("font-size", 8).text(yr);
      }

      // Y label
      svg.append("text").attr("x", 14).attr("y", margin.top + iH/2).attr("text-anchor", "middle").attr("transform", `rotate(-90, 14, ${margin.top + iH/2})`).attr("fill", "#52525b").attr("font-size", 8).text(normalized ? "Citations per 1K total" : "Citations / year");

      // Lines
      const line = d3.line()
        .x(d => x(d.year))
        .y(d => y(normalized && d._total > 0 ? (d.citations / d._total) * 1000 : d.citations))
        .curve(d3.curveMonotoneX);

      active.forEach(c => {
        const idx = concepts.indexOf(c);
        const color = COLORS[idx % COLORS.length];
        const sc = SURVIVAL_COLOR[c.survival] || "#f59e0b";
        const isHov = hoveredIdx === idx;
        const anyHov = hoveredIdx !== null;
        const op = anyHov ? (isHov ? 1 : 0.12) : 0.75;

        const pts = c.yearData.filter(d => d.year >= minY && d.year <= maxY).map(d => ({...d, _total: c.totalCitations}));

        svg.append("path")
          .datum(pts)
          .attr("d", line)
          .attr("fill", "none")
          .attr("stroke", color)
          .attr("stroke-width", isHov ? 3 : 1.5)
          .attr("opacity", op)
          .attr("stroke-linejoin", "round")
          .attr("stroke-linecap", "round");

        // Endpoint survival dot
        const last = [...c.yearData].reverse().find(d => d.citations > 0 && d.year >= minY && d.year <= maxY);
        if (last) {
          const val = normalized && c.totalCitations > 0 ? (last.citations / c.totalCitations) * 1000 : last.citations;
          svg.append("circle").attr("cx", x(last.year)).attr("cy", y(val)).attr("r", 3).attr("fill", sc).attr("stroke", "#09090b").attr("stroke-width", 1).attr("opacity", anyHov && !isHov ? 0.2 : 0.9);
        }

        // Label on hover
        if (isHov && c.peakYear) {
          const pv = normalized && c.totalCitations > 0 ? (c.peakCitations / c.totalCitations) * 1000 : c.peakCitations;
          svg.append("text").attr("x", x(c.peakYear) + 4).attr("y", y(pv) - 6).attr("fill", color).attr("font-size", 8).attr("font-weight", "bold").text(c.name);
        }
      });

      // Stat annotations
      if (showAnnotations) {
        annotations.filter(a => a.type === "stat").forEach((s, i) => {
          svg.append("text").attr("x", x(s.year) + 4).attr("y", margin.top + 26 + i * 14).attr("fill", "#f59e0b").attr("opacity", 0.8).attr("font-size", 8).attr("font-weight", "bold").text(s.label);
        });
      }

      // Mouse interaction
      const overlay = svg.append("rect")
        .attr("x", margin.left).attr("y", margin.top).attr("width", iW).attr("height", iH)
        .attr("fill", "transparent").style("cursor", "crosshair");

      const tipEl = document.getElementById("tooltip");

      overlay.on("mousemove", function(event) {
        const [mx, my] = d3.pointer(event);
        const yr = Math.round(x.invert(mx));
        if (yr < minY || yr > maxY) { tipEl.style.display = "none"; return; }

        const rows = active.map(c => {
          const d = c.yearData.find(d => d.year === yr);
          return { name: c.name, citations: d?.citations || 0, color: COLORS[concepts.indexOf(c) % COLORS.length] };
        }).filter(r => r.citations > 0).sort((a, b) => b.citations - a.citations);

        if (rows.length === 0) { tipEl.style.display = "none"; return; }

        tipEl.style.display = "block";
        const rect = document.getElementById("chart-area").getBoundingClientRect();
        const svgRect = document.getElementById("chart").getBoundingClientRect();
        const px = ((event.clientX - svgRect.left) / svgRect.width) * 100;
        tipEl.style.left = Math.min(px, 70) + "%";
        tipEl.style.top = (event.clientY - rect.top - 10) + "px";
        tipEl.innerHTML = `<div class="year">${yr}</div>` + rows.slice(0, 8).map(r =>
          `<div class="row"><span class="swatch" style="background:${r.color}"></span><span style="color:#a1a1aa">${r.name}</span><span class="val">${r.citations}</span></div>`
        ).join("") + (rows.length > 8 ? `<div style="font-size:8px;color:#52525b;margin-top:2px">+${rows.length-8} more</div>` : "");
      });

      overlay.on("mouseleave", () => { tipEl.style.display = "none"; });
    }

    function bindControls() {
      document.getElementById("btn-svg").addEventListener("click", () => {
        const svg = document.getElementById("chart");
        const source = new XMLSerializer().serializeToString(svg);
        const blob = new Blob(['<?xml version="1.0" standalone="no"?>\r\n' + source], { type: "image/svg+xml" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "citation-cliff.svg";
        a.click();
      });

      document.getElementById("btn-annotations").addEventListener("click", function() {
        showAnnotations = !showAnnotations;
        this.classList.toggle("active", showAnnotations);
        draw();
      });

      document.getElementById("btn-normalized").addEventListener("click", function() {
        normalized = !normalized;
        this.classList.toggle("active", normalized);
        draw();
      });

      document.getElementById("btn-lost").addEventListener("click", () => {
        selected = new Set(DATA.concepts.map((c, i) => c.survival === "genuinely_lost" ? i : -1).filter(i => i >= 0));
        updateLegendStyles(); draw();
      });

      document.getElementById("btn-fading").addEventListener("click", () => {
        selected = new Set(DATA.concepts.map((c, i) => ["renamed","known_but_ignored","below_threshold"].includes(c.survival) ? i : -1).filter(i => i >= 0));
        updateLegendStyles(); draw();
      });

      document.getElementById("btn-active").addEventListener("click", () => {
        selected = new Set(DATA.concepts.map((c, i) => c.survival === "active" ? i : -1).filter(i => i >= 0));
        updateLegendStyles(); draw();
      });
    }

    init();
  </script>
</body>
</html>
